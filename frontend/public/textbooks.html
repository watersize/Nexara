        </div>
        <div class="header-right">
          <button class="icon-btn" id="theme-toggle"><svg class="sun-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M10 2V4M10 16V18M18 10H16M4 10H2M15.66 4.34L14.24 5.76M5.76 14.24L4.34 15.66M15.66 15.66L14.24 14.24M5.76 5.76L4.34 4.34" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><svg class="moon-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M17.5 10.73C17.1 13.28 15.12 15.38 12.55 15.87C9.35 16.48 6.16 14.48 5.42 11.28C4.68 8.08 6.69 4.89 9.89 4.28C10.18 4.22 10.46 4.19 10.73 4.17C9.32 6.29 9.32 9.11 10.73 11.23C12.14 13.35 14.78 14.22 17.23 13.49C17.45 12.61 17.54 11.67 17.5 10.73Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>

      <main class="main">
        <!-- Upload Zone -->

          <input type="file" id="file-input" accept=".pdf,.docx,.txt,.png,.jpg,.jpeg" multiple style="display:none;">

          </div>
          <div class="upload-title">Загрузить учебник или документ</div>
          <div class="upload-sub">Перетащи файл или нажми для выбора</div>
          <div class="upload-formats">PDF, DOCX, TXT, изображения</div>
        </div>

        <!-- Subjects Grid -->
        <div class="section-label" style="margin-top:4px;">Загруженные материалы</div>

      </nav>
    </div>

  <script src="app.js"></script>
  <script>
  const BOOKS_KEY = 'nexara-textbooks';
  const DEFAULT_BOOKS = [
    { id: 'b1', name: 'Алгебра 9 класс', subject: 'Математика', pages: 320, color: '59,130,246', file: null },
    { id: 'b2', name: 'Физика 9 класс', subject: 'Физика', pages: 280, color: '168,85,247', file: null },
    { id: 'b3', name: 'Химия 9 класс', subject: 'Химия', pages: 240, color: '249,115,22', file: null },
    { id: 'b4', name: 'Биология', subject: 'Биология', pages: 310, color: '34,197,94', file: null },
    { id: 'b5', name: 'История России', subject: 'История', pages: 290, color: '245,158,11', file: null },
    { id: 'b6', name: 'Русский язык', subject: 'Русский', pages: 270, color: '16,185,129', file: null },
    { id: 'b7', name: 'Английский язык', subject: 'Английский', pages: 200, color: '236,72,153', file: null },
    { id: 'b8', name: 'Информатика', subject: 'Информатика', pages: 190, color: '99,102,241', file: null },
  ];

  function loadBooks() {
    try { return JSON.parse(localStorage.getItem(BOOKS_KEY)) || DEFAULT_BOOKS; } catch { return DEFAULT_BOOKS; }
  }
  function saveBooks(b) { localStorage.setItem(BOOKS_KEY, JSON.stringify(b)); }

  function renderBooks() {
    const books = loadBooks();
    const grid = document.getElementById('textbooks-grid');
    if (!grid) return;
    grid.innerHTML = books.map(b => `
      <div class="textbook-card" data-id="${b.id}">
        <div class="textbook-cover" style="--tc-color:${b.color};">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none"><path d="M4 19.5C4 18.12 5.12 17 6.5 17H20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M6.5 2H20V22H6.5C5.12 22 4 20.88 4 19.5V4.5C4 3.12 5.12 2 6.5 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="textbook-name">${b.name}</div>
        <div class="textbook-meta">${b.subject} · ${b.pages} стр.</div>
        <a href="chat.html" class="ask-btn" title="Задать вопрос по учебнику">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 3C7.03 3 3 6.58 3 11C3 13.39 4.19 15.53 6.12 16.96L5 21L9.46 19.31C10.28 19.53 11.13 19.65 12 19.65C16.97 19.65 21 16.07 21 11.65C21 7.23 16.97 3 12 3Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Спросить AI
        </a>
      </div>
    `).join('');
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderBooks();

    const zone = document.getElementById('upload-zone');
    const fileInput = document.getElementById('file-input');

    zone?.addEventListener('click', () => fileInput?.click());
    zone?.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone?.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone?.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });
    fileInput?.addEventListener('change', (e) => handleFiles(e.target.files));

    function handleFiles(files) {
      const books = loadBooks();
      Array.from(files).forEach(file => {
        const name = file.name.replace(/\.[^.]+$/, '');
        books.push({
          id: 'b-' + Date.now() + Math.random(),
          name,
          subject: 'Загружено',
          pages: 0,
          color: '100,116,139',
          file: file.name,
        });
      });
      saveBooks(books);
      renderBooks();
    }
  });
  </script>
