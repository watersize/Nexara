<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Блокнот - Nexara</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="logo-text">Nexara</span>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="sidebar-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 9L12 2L21 9V20C21 20.55 20.55 21 20 21H4C3.45 21 3 20.55 3 20V9Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 22V12H15V22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Главная</span>
        </a>
        <a href="notebook.html" class="sidebar-item active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 4H20C20.55 4 21 4.45 21 5V19C21 19.55 20.55 20 20 20H4C3.45 20 3 19.55 3 19V5C3 4.45 3.45 4 4 4Z" stroke="currentColor" stroke-width="1.5"/><path d="M7 4V20M11 9H17M11 13H17M11 17H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>Блокнот</span>
        </a>
        <a href="planner.html" class="sidebar-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M9 11L12 14L22 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 12V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V5C3 3.9 3.9 3 5 3H16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Планировщик</span>
        </a>
        <a href="schedule.html" class="sidebar-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M16 2V6M8 2V6M3 10H21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>Расписание</span>
        </a>
        <a href="chat.html" class="sidebar-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 3C7.03 3 3 6.58 3 11C3 13.39 4.19 15.53 6.12 16.96L5 21L9.46 19.31C10.28 19.53 11.13 19.65 12 19.65C16.97 19.65 21 16.07 21 11.65C21 7.23 16.97 3 12 3Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>AI Чат</span>
        </a>
        <a href="textbooks.html" class="sidebar-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 19.5C4 18.12 5.12 17 6.5 17H20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M6.5 2H20V22H6.5C5.12 22 4 20.88 4 19.5V4.5C4 3.12 5.12 2 6.5 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Учебники</span>
        </a>
      </nav>
      <div class="sidebar-bottom">
        <a href="settings.html" class="sidebar-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M12 1V3M12 21V23M23 12H21M3 12H1M20.07 3.93L18.66 5.34M5.34 18.66L3.93 20.07M20.07 20.07L18.66 18.66M5.34 5.34L3.93 3.93" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>Настройки</span>
        </a>
        <button class="sidebar-item" id="theme-toggle-sidebar">
          <svg class="sun-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M10 2V4M10 16V18M18 10H16M4 10H2M15.66 4.34L14.24 5.76M5.76 14.24L4.34 15.66M15.66 15.66L14.24 14.24M5.76 5.76L4.34 4.34" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <svg class="moon-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M17.5 10.73C17.1 13.28 15.12 15.38 12.55 15.87C9.35 16.48 6.16 14.48 5.42 11.28C4.68 8.08 6.69 4.89 9.89 4.28C10.18 4.22 10.46 4.19 10.73 4.17C9.32 6.29 9.32 9.11 10.73 11.23C12.14 13.35 14.78 14.22 17.23 13.49C17.45 12.61 17.54 11.67 17.5 10.73Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Тема</span>
        </button>
      </div>
    </aside>

    <div class="app-body">
      <!-- Mobile Header -->
      <header class="header">
        <div class="header-left">
          <a href="index.html" class="back-btn">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M13 16L7 10L13 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </a>
          <span class="page-title">Блокнот</span>
        </div>
        <div class="header-right">
          <button class="icon-btn" id="theme-toggle">
            <svg class="sun-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M10 2V4M10 16V18M18 10H16M4 10H2M15.66 4.34L14.24 5.76M5.76 14.24L4.34 15.66M15.66 15.66L14.24 14.24M5.76 5.76L4.34 4.34" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <svg class="moon-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M17.5 10.73C17.1 13.28 15.12 15.38 12.55 15.87C9.35 16.48 6.16 14.48 5.42 11.28C4.68 8.08 6.69 4.89 9.89 4.28C10.18 4.22 10.46 4.19 10.73 4.17C9.32 6.29 9.32 9.11 10.73 11.23C12.14 13.35 14.78 14.22 17.23 13.49C17.45 12.61 17.54 11.67 17.5 10.73Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="icon-btn" id="new-note-mobile">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 4V16M4 10H16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
      </header>

      <!-- Desktop Notebook Layout -->
      <div class="notebook-layout desktop-only">
        <!-- Notes List Sidebar -->
        <div class="notes-sidebar">
          <div class="notes-sidebar-header">
            <span class="notes-sidebar-title">Заметки</span>
            <button class="icon-btn" id="new-note-btn" title="Новая заметка">
              <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 4V16M4 10H16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
          </div>
          <div class="notes-search">
            <input type="search" class="search-input" placeholder="Поиск заметок..." id="search-notes">
          </div>
          <div class="notes-list" id="notes-list">
            <!-- populated by JS -->
          </div>
        </div>

        <!-- Editor -->
        <div class="note-editor" id="note-editor">
          <div class="editor-toolbar">
            <button class="toolbar-btn" data-cmd="bold" title="Жирный"><b>B</b></button>
            <button class="toolbar-btn" data-cmd="italic" title="Курсив"><i>I</i></button>
            <button class="toolbar-btn" data-cmd="underline" title="Подчёркнутый"><u>U</u></button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" data-cmd="h2" title="Заголовок">H2</button>
            <button class="toolbar-btn" data-cmd="h3" title="Подзаголовок">H3</button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" data-cmd="ul" title="Список">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M5 4H13M5 8H13M5 12H13M2.5 4H2.51M2.5 8H2.51M2.5 12H2.51" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
            <button class="toolbar-btn" data-cmd="ol" title="Нумерованный список">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4H14M6 8H14M6 12H14M2 3V5M2 3C2 3 2.5 3 3 3M2 5H3M2 7H3L2 9H3M2 11H3L2 13L3 13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" data-cmd="tag-math" title="Тег: Математика" style="font-size:0.7rem; width:auto; padding:0 8px;">Математика</button>
            <button class="toolbar-btn" data-cmd="tag-physics" title="Тег: Физика" style="font-size:0.7rem; width:auto; padding:0 8px;">Физика</button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" id="delete-note-btn" title="Удалить заметку" style="margin-left:auto; color: #ef4444;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 6H21M8 6V4H16V6M19 6L18 20C18 21.1 17.1 22 16 22H8C6.9 22 6 21.1 6 20L5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
          <input type="text" class="editor-title-input" id="editor-title" placeholder="Название заметки...">
          <textarea class="editor-textarea" id="editor-content" placeholder="Начни писать...&#10;&#10;Используй кнопки форматирования выше"></textarea>
          <div class="editor-status">
            <span id="editor-word-count">0 слов</span>
            <span id="editor-save-status">Сохранено</span>
          </div>
        </div>

        <!-- Empty editor state -->
        <div class="note-editor" id="empty-editor" style="display:none;">
          <div class="empty-state" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <svg viewBox="0 0 24 24" fill="none" style="width:64px;height:64px;opacity:0.3;margin-bottom:16px;">
              <path d="M4 4H20C20.55 4 21 4.45 21 5V19C21 19.55 20.55 20 20 20H4C3.45 20 3 19.55 3 19V5C3 4.45 3.45 4 4 4Z" stroke="currentColor" stroke-width="1.5"/>
              <path d="M7 4V20M11 9H17M11 13H17M11 17H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <p class="empty-state-title">Выбери заметку</p>
            <p class="empty-state-text">Или создай новую, нажав +</p>
            <button id="create-first-note" style="margin-top:16px; padding:10px 20px; background:var(--accent-gradient); color:white; border-radius:var(--radius-md); font-size:0.88rem; font-weight:600;">Создать заметку</button>
          </div>
        </div>
      </div>

      <!-- Mobile Notebook View -->
      <div class="mobile-only" id="mobile-notebook-view">
        <!-- List view -->
        <div id="mobile-list-view">
          <div class="main" style="padding-top:16px;">
            <div class="notes-search" style="padding:0; margin-bottom:14px;">
              <input type="search" class="search-input" placeholder="Поиск заметок..." id="search-notes-mobile">
            </div>
            <div class="notebook-mobile-list" id="mobile-notes-list" style="padding:0 0 100px;"></div>
          </div>
        </div>
        <!-- Editor view -->
        <div id="mobile-editor-view" style="display:none; flex-direction:column; height:calc(100dvh - 56px);">
          <div class="editor-toolbar">
            <button class="toolbar-btn" id="mobile-back-btn">
              <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M13 16L7 10L13 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" data-cmd="bold"><b>B</b></button>
            <button class="toolbar-btn" data-cmd="italic"><i>I</i></button>
            <button class="toolbar-btn" data-cmd="underline"><u>U</u></button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" id="delete-note-mobile" style="margin-left:auto; color:#ef4444;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 6H21M8 6V4H16V6M19 6L18 20C18 21.1 17.1 22 16 22H8C6.9 22 6 21.1 6 20L5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
          <input type="text" class="editor-title-input" id="mobile-editor-title" placeholder="Название заметки...">
          <textarea class="editor-textarea" id="mobile-editor-content" placeholder="Начни писать..." style="flex:1;"></textarea>
          <div class="editor-status">
            <span id="mobile-word-count">0 слов</span>
            <span>Сохранено</span>
          </div>
        </div>
      </div>

      <!-- FAB (mobile) -->
      <button class="fab mobile-only" id="new-note-fab" aria-label="Новая заметка">
        <svg width="22" height="22" viewBox="0 0 20 20" fill="none"><path d="M10 4V16M4 10H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>

      <!-- Mobile Nav -->
      <nav class="mobile-nav">
        <a href="index.html" class="nav-item">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 9L12 2L21 9V20C21 20.55 20.55 21 20 21H4C3.45 21 3 20.55 3 20V9Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 22V12H15V22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Главная</span>
        </a>
        <a href="notebook.html" class="nav-item active">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 4H20C20.55 4 21 4.45 21 5V19C21 19.55 20.55 20 20 20H4C3.45 20 3 19.55 3 19V5C3 4.45 3.45 4 4 4Z" stroke="currentColor" stroke-width="1.5"/><path d="M7 4V20M11 9H17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>Блокнот</span>
        </a>
        <a href="planner.html" class="nav-item">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M9 11L12 14L22 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 12V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V5C3 3.9 3.9 3 5 3H16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Задачи</span>
        </a>
        <a href="schedule.html" class="nav-item">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M16 2V6M8 2V6M3 10H21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>Расписание</span>
        </a>
        <a href="chat.html" class="nav-item">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 3C7.03 3 3 6.58 3 11C3 13.39 4.19 15.53 6.12 16.96L5 21L9.46 19.31C10.28 19.53 11.13 19.65 12 19.65C16.97 19.65 21 16.07 21 11.65C21 7.23 16.97 3 12 3Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>AI Чат</span>
        </a>
      </nav>
    </div>
  </div>

  <style>
    .desktop-only { display: none; }
    .mobile-only { display: block; }
    @media (min-width: 768px) {
      .desktop-only { display: flex; flex: 1; overflow: hidden; }
      .mobile-only { display: none !important; }
    }
    #mobile-editor-view { display: none; }
    #mobile-editor-view.active { display: flex; }
  </style>

  <script src="app.js"></script>
  <script src="notebook.js"></script>
</body>
</html>
