        <span class="logo-text">veyo.ai</span>

        <a href="notebook.html" class="sidebar-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 4H20C20.55 4 21 4.45 21 5V19C21 19.55 20.55 20 20 20H4C3.45 20 3 19.55 3 19V5C3 4.45 3.45 4 4 4Z" stroke="currentColor" stroke-width="1.5"/><path d="M7 4V20M11 9H17M11 13H17M11 17H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span>Блокнот</span></a>
        <a href="planner.html" class="sidebar-item active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M9 11L12 14L22 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 12V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V5C3 3.9 3.9 3 5 3H16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Планировщик</span></a>
        <a href="schedule.html" class="sidebar-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M16 2V6M8 2V6M3 10H21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span>Расписание</span></a>
        <a href="chat.html" class="sidebar-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 3C7.03 3 3 6.58 3 11C3 13.39 4.19 15.53 6.12 16.96L5 21L9.46 19.31C10.28 19.53 11.13 19.65 12 19.65C16.97 19.65 21 16.07 21 11.65C21 7.23 16.97 3 12 3Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span>AI Чат</span></a>
        <a href="textbooks.html" class="sidebar-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 19.5C4 18.12 5.12 17 6.5 17H20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M6.5 2H20V22H6.5C5.12 22 4 20.88 4 19.5V4.5C4 3.12 5.12 2 6.5 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Учебники</span></a>
      </nav>
      <div class="sidebar-bottom">
        <a href="settings.html" class="sidebar-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M12 1V3M12 21V23M23 12H21M3 12H1M20.07 3.93L18.66 5.34M5.34 18.66L3.93 20.07M20.07 20.07L18.66 18.66M5.34 5.34L3.93 3.93" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span>Настройки</span></a>
        <button class="sidebar-item" id="theme-toggle-sidebar"><svg class="sun-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M10 2V4M10 16V18M18 10H16M4 10H2M15.66 4.34L14.24 5.76M5.76 14.24L4.34 15.66M15.66 15.66L14.24 14.24M5.76 5.76L4.34 4.34" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><svg class="moon-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M17.5 10.73C17.1 13.28 15.12 15.38 12.55 15.87C9.35 16.48 6.16 14.48 5.42 11.28C4.68 8.08 6.69 4.89 9.89 4.28C10.18 4.22 10.46 4.19 10.73 4.17C9.32 6.29 9.32 9.11 10.73 11.23C12.14 13.35 14.78 14.22 17.23 13.49C17.45 12.61 17.54 11.67 17.5 10.73Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Тема</span></button>
      </div>
    </aside>

    <div class="app-body">
      <header class="header">
        <div class="header-left">
          <a href="index.html" class="back-btn"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M13 16L7 10L13 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
          <span class="page-title">Планировщик</span>
        </div>
        <div class="header-right">
          <button class="icon-btn" id="theme-toggle"><svg class="sun-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M10 2V4M10 16V18M18 10H16M4 10H2M15.66 4.34L14.24 5.76M5.76 14.24L4.34 15.66M15.66 15.66L14.24 14.24M5.76 5.76L4.34 4.34" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><svg class="moon-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M17.5 10.73C17.1 13.28 15.12 15.38 12.55 15.87C9.35 16.48 6.16 14.48 5.42 11.28C4.68 8.08 6.69 4.89 9.89 4.28C10.18 4.22 10.46 4.19 10.73 4.17C9.32 6.29 9.32 9.11 10.73 11.23C12.14 13.35 14.78 14.22 17.23 13.49C17.45 12.61 17.54 11.67 17.5 10.73Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        </div>
      </header>

      <main class="main">
        <!-- Progress bar -->
        <div id="progress-bar-area" style="margin-bottom:20px; animation: fadeInUp 0.35s ease;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
            <span style="font-size:0.82rem; color:var(--text-secondary);">Выполнено задач сегодня</span>
            <span style="font-size:0.82rem; font-weight:700;" id="progress-label">0 / 0</span>
          </div>
          <div style="height:6px; background:var(--bg-tertiary); border-radius:100px; overflow:hidden;">
            <div id="progress-fill" style="height:100%; background:var(--accent-gradient); border-radius:100px; transition:width 0.4s ease; width:0%;"></div>
          </div>
        </div>

        <div class="planner-sections" id="planner-sections">
          <!-- populated by JS -->
        </div>
      </main>

      <!-- Add Task Modal -->
      <div class="modal-backdrop" id="modal-backdrop">
        <div class="modal">
          <div class="modal-handle"></div>
          <div class="modal-title">Новая задача</div>
          <div class="form-group">
            <label class="form-label">Название задачи</label>
            <input type="text" class="form-input" id="task-title-input" placeholder="Например: Сделать домашнее задание по физике">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Предмет</label>
              <select class="form-input" id="task-subject-input">
                <option value="Общее">Общее</option>
                <option value="Математика">Математика</option>
                <option value="Физика">Физика</option>
                <option value="Химия">Химия</option>
                <option value="Биология">Биология</option>
                <option value="История">История</option>
                <option value="Литература">Литература</option>
                <option value="Английский">Английский</option>
                <option value="Информатика">Информатика</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Дедлайн</label>
              <input type="date" class="form-input" id="task-deadline-input">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Приоритет</label>
              <select class="form-input" id="task-priority-input">
                <option value="low">Низкий</option>
                <option value="medium" selected>Средний</option>
                <option value="high">Высокий</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Раздел</label>
              <select class="form-input" id="task-section-input">
                <option value="today">Сегодня</option>
                <option value="week">На неделе</option>
                <option value="later">Позже</option>
              </select>
            </div>
          </div>
          <button class="btn-primary" id="save-task-btn">Добавить задачу</button>
        </div>
      </div>

      <button class="fab" id="add-task-fab" aria-label="Добавить задачу">
        <svg width="22" height="22" viewBox="0 0 20 20" fill="none"><path d="M10 4V16M4 10H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>

      <nav class="mobile-nav">
        <a href="index.html" class="nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 9L12 2L21 9V20C21 20.55 20.55 21 20 21H4C3.45 21 3 20.55 3 20V9Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 22V12H15V22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Главная</span></a>
        <a href="notebook.html" class="nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 4H20C20.55 4 21 4.45 21 5V19C21 19.55 20.55 20 20 20H4C3.45 20 3 19.55 3 19V5C3 4.45 3.45 4 4 4Z" stroke="currentColor" stroke-width="1.5"/><path d="M7 4V20M11 9H17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span>Блокнот</span></a>
        <a href="planner.html" class="nav-item active"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M9 11L12 14L22 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 12V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V5C3 3.9 3.9 3 5 3H16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Задачи</span></a>
        <a href="schedule.html" class="nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M16 2V6M8 2V6M3 10H21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span>Расписание</span></a>
        <a href="chat.html" class="nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 3C7.03 3 3 6.58 3 11C3 13.39 4.19 15.53 6.12 16.96L5 21L9.46 19.31C10.28 19.53 11.13 19.65 12 19.65C16.97 19.65 21 16.07 21 11.65C21 7.23 16.97 3 12 3Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span>AI Чат</span></a>
      </nav>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="planner.js"></script>
</body>
</html>
